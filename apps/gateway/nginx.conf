events {}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  # --- CONFIGURAÇÕES DE SEGURANÇA E PROTEÇÃO CONTRA ABUSOS (SPRINT 2) ---
  server_tokens off;              # Oculta a versão do Nginx (reduz superfície de ataque)
  client_max_body_size 5M;        # Limita payloads abusivos para evitar enchentes de memória
  client_body_timeout 12s;        # Proteção contra ataques do tipo Slowloris
  client_header_timeout 12s;      # Timeout rápido para evitar conexões mortas

  # Zonas de Rate Limit na Memória Compartilhada (10MB suporta ~160.000 IPs)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
  # ------------------------------------------------------------------------

  server {
    listen 80;

    location /api/users {
      limit_req zone=api_limit burst=30 nodelay;
      limit_conn conn_limit 20;
      
      set $identity_service identity-service;
      rewrite ^/api/users(.*)$ /users$1 break;
      proxy_pass http://$identity_service:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/transactions {
      limit_req zone=api_limit burst=30 nodelay;
      limit_conn conn_limit 20;

      set $finance_service finance-service;
      rewrite ^/api/transactions(.*)$ /transactions$1 break;
      proxy_pass http://$finance_service:3002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/categories {
      limit_req zone=api_limit burst=30 nodelay;
      limit_conn conn_limit 20;

      set $finance_service finance-service;
      rewrite ^/api/categories(.*)$ /categories$1 break;
      proxy_pass http://$finance_service:3002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/members {
      limit_req zone=api_limit burst=30 nodelay;
      limit_conn conn_limit 20;

      set $finance_service finance-service;
      rewrite ^/api/members(.*)$ /members$1 break;
      proxy_pass http://$finance_service:3002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/budget-rules {
      limit_req zone=api_limit burst=30 nodelay;
      limit_conn conn_limit 20;

      set $finance_service finance-service;
      rewrite ^/api/budget-rules(.*)$ /budget-rules$1 break;
      proxy_pass http://$finance_service:3002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      limit_conn conn_limit 10;

      set $identity_service identity-service;
      rewrite ^/api/auth/(.*)$ /auth/$1 break;
      proxy_pass http://$identity_service:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
    }

    location / {
      set $frontend_service frontend;
      proxy_pass http://$frontend_service:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_max_temp_file_size 0;
      
      # WebSockets support for HMR
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # CORS Configuration
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    add_header 'Access-Control-Max-Age' 1728000 always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }
  }
}

