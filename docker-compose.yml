services:
  identity-service:
    build:
      context: ./apps/backend/identity-service
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3001:3001"
    env_file:
      - ./apps/backend/identity-service/.env.local
    volumes:
      - ./apps/backend/identity-service:/app:delegated
      - /app/node_modules

  finance-service:
    build:
      context: ./apps/backend/finance-service
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3002:3002"
    env_file:
      - ./apps/backend/finance-service/.env.local
    volumes:
      - ./apps/backend/finance-service:/app:delegated
      - /app/node_modules

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./apps/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-service
      - finance-service

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # Conecta o painel ao motor do Docker do seu celular
      - /var/run/docker.sock:/var/run/docker.sock
      # Salva as configurações do próprio Dockge
      - ./data:/app/data
      # É dentro desta pasta que seus outros docker-compose.yml vão ficar
      - ./stacks:/opt/stacks
    environment:
      # Diz ao Dockge onde procurar suas aplicações
      - DOCKGE_STACKS_DIR=/opt/stacks

volumes:
  postgres_data:
